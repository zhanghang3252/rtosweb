# ================================================================
# GitHub Actions — 统一部署 RTOS 官网生态到 GitHub Pages
#
# 构建内容：
#   1. 门户网站（纯静态 HTML/CSS/JS）→ 根目录
#   2. Docusaurus 文档站 → /docs/ 子目录
#
# 部署路径：https://zhanghang3252.github.io/rtosweb/
# ================================================================

name: Deploy RTOS Website

on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ====== 构建阶段 ======
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 构建 Docusaurus 文档站
      - name: Install Docusaurus dependencies
        run: npm ci
        working-directory: ./docs

      - name: Build Docusaurus
        run: npm run build
        working-directory: ./docs

      # 合并门户网站和文档站到一个输出目录
      - name: Merge site files
        run: |
          # 创建输出目录
          mkdir -p _site
          
          # 复制门户网站文件到根目录
          cp -r website/* _site/
          
          # 复制文档站到 /docs/ 子目录
          cp -r docs/build _site/docs
          
          # 添加 .nojekyll 文件（防止 Jekyll 处理）
          touch _site/.nojekyll
          
          # 列出最终输出
          echo "=== 部署目录结构 ==="
          ls -la _site/
          echo ""
          echo "=== 文档站 ==="
          ls -la _site/docs/ | head -10

      # 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  # ====== 部署阶段 ======
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
