# ================================================================
# GitHub Actions — 部署 RTOS 官方门户网站到 GitHub Pages
# 
# 触发条件：推送到 main 分支的 website/ 目录变更
# 部署路径：GitHub Pages 根目录（或子路径 /website/）
# ================================================================

name: Deploy Portal Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:  # 支持手动触发

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务
concurrency:
  group: "pages-website"
  cancel-in-progress: true

jobs:
  # ====== 构建阶段 ======
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 部署门户网站（纯静态，无需构建步骤）
      # 如果需要构建步骤（如 SCSS 编译），在此添加
      - name: Prepare website files
        run: |
          echo "✅ Portal website files ready"
          ls -la website/
          
          # 如果存在 CNAME 文件，复制到输出目录
          # echo "your-domain.com" > website/CNAME

      # 上传构建产物
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 门户网站文件目录
          path: './website'

  # ====== 部署阶段 ======
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
